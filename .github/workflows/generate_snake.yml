name: Generate Snake

on:
  schedule:
    # Menjalankan aksi setiap hari pada pukul 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Menambahkan opsi untuk menjalankannya secara manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Generate gambar ular dari kontribusi pengguna
      - name: Generate Snake SVG
        uses: platane/snk/svg-only@v3
        with:
          github_user_name: Akhmady
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Push file yang dihasilkan ke branch 'output'
      - name: Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
